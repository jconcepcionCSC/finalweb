<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Credit Service Center</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C96A;
  --gold-dark: #8B6914;
  --gold-faint: rgba(201,168,76,0.08);
  --black: #0A0A0A;
  --black-mid: #111111;
  --black-card: #161616;
  --black-border: #1E1E1E;
  --white: #F5F0E8;
  --white-dim: rgba(245,240,232,0.55);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
}

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  overflow: hidden;
  cursor: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* Noise overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* Grid background */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

/* Custom cursor */
.cursor {
  position: fixed; top: 0; left: 0;
  width: 10px; height: 10px;
  background: var(--gold);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s ease, height 0.2s ease;
}
.cursor-ring {
  position: fixed; top: 0; left: 0;
  width: 36px; height: 36px;
  border: 1px solid rgba(201,168,76,0.5);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s;
}

/* Glowing orb */
.orb {
  position: fixed;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, rgba(201,168,76,0.02) 40%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: orb-pulse 6s ease-in-out infinite;
}
@keyframes orb-pulse {
  0%,100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  50% { transform: translate(-50%, -50%) scale(1.12); opacity: 0.6; }
}

/* Main container */
.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  animation: fade-up 0.9s ease 0.1s both;
}

/* Logo */
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 700;
  letter-spacing: 0.3em;
  color: var(--gold);
  text-transform: uppercase;
  text-align: center;
  line-height: 1;
  position: relative;
  padding-bottom: 20px;
  margin-bottom: 20px;
}
.logo span {
  color: var(--white);
  font-weight: 300;
}
.logo::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 60%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* Eyebrow */
.eyebrow {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 48px;
  opacity: 0.7;
}
.eyebrow-line { width: 32px; height: 1px; background: var(--gold); }
.eyebrow span {
  font-size: 0.58rem;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
}

/* Login button */
.btn-login {
  font-family: 'Montserrat', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 16px 52px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: var(--black);
  border: none;
  border-radius: 2px;
  cursor: none;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.3s;
}
.btn-login::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  opacity: 0;
  transition: opacity 0.3s;
}
.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 40px rgba(201,168,76,0.4);
}
.btn-login:hover::before { opacity: 1; }
.btn-login span { position: relative; z-index: 1; }

/* Copyright */
.copyright {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  color: rgba(245,240,232,0.2);
  text-transform: uppercase;
  white-space: nowrap;
  z-index: 1;
}

/* Corner accents */
.corner {
  position: fixed;
  width: 48px; height: 48px;
  pointer-events: none;
  z-index: 1;
}
.corner--tl { top: 24px; left: 24px; border-top: 1px solid rgba(201,168,76,0.25); border-left: 1px solid rgba(201,168,76,0.25); }
.corner--tr { top: 24px; right: 24px; border-top: 1px solid rgba(201,168,76,0.25); border-right: 1px solid rgba(201,168,76,0.25); }
.corner--bl { bottom: 24px; left: 24px; border-bottom: 1px solid rgba(201,168,76,0.25); border-left: 1px solid rgba(201,168,76,0.25); }
.corner--br { bottom: 24px; right: 24px; border-bottom: 1px solid rgba(201,168,76,0.25); border-right: 1px solid rgba(201,168,76,0.25); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--black-card);
  border: 1px solid rgba(201,168,76,0.25);
  padding: 60px;
  width: 480px;
  max-width: 90vw;
  position: relative;
  transform: translateY(20px);
  transition: transform 0.3s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-close {
  position: absolute; top: 20px; right: 20px;
  background: none; border: none;
  color: var(--white-dim);
  font-size: 1.2rem;
  cursor: none;
  transition: color 0.2s;
}
.modal-close:hover { color: var(--gold); }
.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 8px;
}
.modal-sub {
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.modal-divider { width: 40px; height: 1px; background: var(--gold); margin-bottom: 36px; }

.form-row { margin-bottom: 20px; }
.form-label {
  display: block;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
  margin-bottom: 8px;
}
.form-input {
  width: 100%;
  background: var(--black-mid);
  border: 1px solid var(--black-border);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-size: 0.82rem;
  padding: 14px 18px;
  border-radius: 2px;
  outline: none;
  transition: border-color 0.3s, background 0.3s;
  letter-spacing: 0.03em;
}
.form-input:focus {
  border-color: var(--gold);
  background: rgba(201,168,76,0.04);
}
.form-input::placeholder { color: rgba(245,240,232,0.25); }

.btn-submit {
  width: 100%; margin-top: 28px; padding: 16px;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 600;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: var(--black);
  border: none;
  border-radius: 2px;
  cursor: none;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.3s;
}
.btn-submit::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  opacity: 0; transition: opacity 0.3s;
}
.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 30px rgba(201,168,76,0.35); }
.btn-submit:hover::before { opacity: 1; }
.btn-submit span { position: relative; z-index: 1; }

@keyframes fade-up {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="orb"></div>
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="container">
  <div class="logo">Credit<span> Service Center</span></div>
  <div class="eyebrow">
    <div class="eyebrow-line"></div>
    <span>Portal de Acceso</span>
    <div class="eyebrow-line"></div>
  </div>
  <button class="btn-login" onclick="openLogin()"><span>Login</span></button>
</div>

<p class="copyright">© 2026 Credit Service Center — All rights reserved.</p>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal" onclick="if(event.target===this)closeLogin()">
  <div class="modal">
    <button class="modal-close" onclick="closeLogin()">✕</button>
    <div class="modal-title">Bienvenido</div>
    <div class="modal-sub">Portal de Empleados</div>
    <div class="modal-divider"></div>
    <div class="form-row">
      <label class="form-label">Usuario</label>
      <input class="form-input" id="loginUsuario" type="text" placeholder="usuario@empresa.com"/>
    </div>
    <div class="form-row" style="margin-top:16px">
      <label class="form-label">Contraseña</label>
      <input class="form-input" id="loginContrasena" type="password" placeholder="••••••••"/>
    </div>
    <p id="loginError" style="color:#e74c3c; font-size:0.7rem; text-align:center; margin-top:12px; display:none;">
      Usuario o contraseña incorrectos.
    </p>
    <button class="btn-submit" onclick="verificarLogin()"><span>Ingresar al Portal</span></button>
    <p style="text-align:center; margin-top:20px; font-size:0.65rem; letter-spacing:0.15em; color:rgba(245,240,232,0.3);">
      ¿OLVIDÓ SU CONTRASEÑA? <a href="#" style="color:var(--gold); text-decoration:none;">RECUPERAR</a>
    </p>
  </div>
</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx=0, my=0, rx=0, ry=0;
  document.addEventListener('mousemove', e => {
    mx=e.clientX; my=e.clientY;
    cursor.style.left=mx+'px'; cursor.style.top=my+'px';
  });
  (function animRing() {
    rx += (mx-rx)*0.12; ry += (my-ry)*0.12;
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(animRing);
  })();
  document.querySelectorAll('a,button').forEach(el => {
    el.addEventListener('mouseenter', () => { cursor.style.width='18px'; cursor.style.height='18px'; ring.style.width='54px'; ring.style.height='54px'; });
    el.addEventListener('mouseleave', () => { cursor.style.width='10px'; cursor.style.height='10px'; ring.style.width='36px'; ring.style.height='36px'; });
  });

  // Modal
  function openLogin() { document.getElementById('loginModal').classList.add('open'); }
  function closeLogin() { document.getElementById('loginModal').classList.remove('open'); }

  function verificarLogin() {
    const usuario = document.getElementById("loginUsuario").value;
    const contrasena = document.getElementById("loginContrasena").value;
    const USUARIO_CORRECTO = "empleado@empresa.com";
    const CONTRASENA_CORRECTA = "miClave123";
    const URL_DESTINO = "login.html";
    if (usuario === USUARIO_CORRECTO && contrasena === CONTRASENA_CORRECTA) {
      window.location.href = URL_DESTINO;
    } else {
      document.getElementById("loginError").style.display = "block";
    }
  }
</script>
</body>
</html>
